<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage Fest 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="hero-section">
<div class="overlay"></div>
<div class="hero-content">
<h1>Heritage Fest 2026</h1>
<p>A Grand Spiritual & Cultural Celebration</p>
<a href="#categories" class="hero-btn">Explore Categories</a>
</div>
</section>

<section id="categories">
<h2 class="center">Event Categories</h2>
<div class="category-grid">
<div class="category-card"><i class="fa-solid fa-music"></i><h3>Music Competition</h3><button onclick="scrollToForm('Music Competition')">Register</button></div>
<div class="category-card"><i class="fa-solid fa-masks-theater"></i><h3>Drama Competition</h3><button onclick="scrollToForm('Drama Competition')">Register</button></div>
<div class="category-card"><i class="fa-solid fa-book-open-reader"></i><h3>Sloka Competition</h3><button onclick="scrollToForm('Sloka Competition')">Register</button></div>
<div class="category-card"><i class="fa-solid fa-palette"></i><h3>Drawing Competition</h3><button onclick="scrollToForm('Drawing Competition')">Register</button></div>
</div>
</section>

<section id="registrationFormSection">
<h2 class="center">Registration Form</h2>
<form id="registrationForm" class="form-grid">
<input id="studentName" placeholder="Student Name" required>
<input id="age" placeholder="Age" required>
<select id="gender" required><option value="">Gender</option><option>Male</option><option>Female</option></select>
<input id="mobile" placeholder="Mobile" required>
<input id="email" placeholder="Email" required>
<input id="school" placeholder="School / College" required>
<input id="city" placeholder="City" required>
<input id="eventName" placeholder="Selected Event" readonly required>
<button id="submitBtn" type="submit">Submit Registration</button>
</form>
</section>

<div id="successPopup" class="modal">
<div class="modal-content">
<h2>Registration Successful</h2>
<p id="successMessage"></p>
<button onclick="closeModal('successPopup')">Close</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
